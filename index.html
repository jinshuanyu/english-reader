<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Reader 🔊</title>

<meta property="og:title" content="English Reader 🔊">
<meta property="og:description" content="貼上英文句子，一句一句聽發音。學英文朗讀練習工具。">
<meta property="og:type" content="website">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f0eb;
    --card: #fdfbf9;
    --primary: #9aabb8;
    --primary-light: #dfe7ec;
    --primary-dark: #7a95a5;
    --text: #4a4a4a;
    --text-light: #8c8c8c;
    --border: #ddd5cc;
    --accent: #d4a574;
    --accent-light: #f5ebe0;
    --green: #a3b5a0;
    --green-light: #e2ebe1;
    --playing-bg: #eef2f5;
    --radius: 14px;
  }

  body {
    font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
    background: var(--bg);
    min-height: 100dvh;
    color: var(--text);
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 20px;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
  }

  header p {
    font-size: 0.85rem;
    color: var(--text-light);
    margin-top: 4px;
  }

  /* Input area */
  .input-section {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 16px;
  }

  .input-section label {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-light);
    display: block;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    min-height: 120px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
    font-size: 1rem;
    color: var(--text);
    resize: vertical;
    line-height: 1.6;
    transition: border-color 0.2s;
  }

  textarea:focus {
    outline: none;
    border-color: var(--primary);
  }

  textarea::placeholder {
    color: #8a8a8a;
  }

  .load-sample {
    display: inline-block;
    margin-top: 6px;
    font-size: 0.8rem;
    color: var(--primary-dark);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
  }

  /* Split mode toggle */
  .split-mode {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 0.82rem;
    color: var(--text-light);
  }

  .split-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .split-opt {
    padding: 6px 12px;
    border: none;
    background: var(--card);
    font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .split-opt.active {
    background: var(--primary);
    color: #fff;
  }

  .split-opt + .split-opt {
    border-left: 1px solid var(--border);
  }

  .input-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--primary);
    color: #fff;
    flex: 1;
  }

  .btn-primary:hover { background: var(--primary-dark); }

  .btn-clear {
    background: var(--bg);
    color: var(--text-light);
    border: 1px solid var(--border);
  }

  .btn-clear:hover {
    background: #e2e8f0;
  }

  /* Reader section */
  .reader-section {
    display: none;
  }

  .reader-section.visible {
    display: block;
  }

  /* Controls bar */
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    padding: 9px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .ctrl-btn:active { transform: scale(0.97); }

  .ctrl-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  .ctrl-btn.playing {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .speed-group {
    display: flex;
    margin-left: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .speed-btn {
    padding: 9px 14px;
    border: none;
    background: var(--card);
    font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .speed-btn.active {
    background: var(--green);
    color: #fff;
  }

  .speed-btn + .speed-btn {
    border-left: 1px solid var(--border);
  }

  /* Sentences list */
  .sentences {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sentence-row {
    background: var(--card);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .sentence-row:hover {
    border-color: var(--primary);
  }

  .sentence-row.playing {
    background: var(--playing-bg);
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light);
  }

  .sentence-num {
    width: 28px;
    height: 28px;
    min-width: 28px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-light);
  }

  .sentence-row.playing .sentence-num {
    background: var(--primary);
    color: #fff;
  }

  .sentence-text {
    font-size: 1.1rem;
    line-height: 1.5;
    color: var(--text);
    flex: 1;
  }

  .play-icon {
    width: 32px;
    height: 32px;
    min-width: 32px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    color: var(--primary);
    transition: all 0.15s ease;
  }

  .sentence-row:hover .play-icon {
    background: var(--primary);
    color: #fff;
  }

  .sentence-row.playing .play-icon {
    background: var(--primary);
    color: #fff;
  }

  /* Edit button */
  .edit-bar {
    text-align: center;
    margin-top: 16px;
  }

  .edit-link {
    font-size: 0.85rem;
    color: var(--text-light);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
  }

  /* Stop button */
  .stop-floating {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 28px;
    border-radius: 50px;
    border: none;
    background: #c98a7a;
    color: #fff;
    font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(201,138,122,0.4);

  /* Voice select */
  .voice-row {

    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 0.82rem;
    color: var(--text-light);
  }

  .voice-row span {
    white-space: nowrap;
  }

  .voice-select {
    flex: 1;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
    font-size: 0.82rem;
    color: var(--text);
    background: var(--card);
    cursor: pointer;
  }

  .voice-select:focus {
    outline: none;
    border-color: var(--primary);
  }

  /* Footer */
  .footer {
    margin-top: 3rem;
    padding-top: 1.2rem;
    border-top: 2px solid var(--border);
    text-align: center;
    font-size: 0.875rem;
    color: var(--text-light);

  }

  .footer-icons a {
    color: var(--text-light);

  }

  .footer-icons a:hover {
    color: var(--primary-dark);
  }

  .support-btn {
    display: inline-block;
    margin: 12px 0;
    padding: 10px 22px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 20px;
    text-decoration: none;
    font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all 0.15s ease;
    box-shadow: 0 2px 8px rgba(212,165,116,0.3);
  }

  .support-btn:hover {
    background: var(--primary-dark);
    box-shadow: 0 2px 12px rgba(122,149,165,0.4);
  }

  .tools-label {
    text-align: center;
    margin: 10px 0 6px;
    font-size: 0.95rem;
    color: var(--text-light);
  }

  .tools-pills {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 0 auto 10px;
    padding: 0 8px;
  }

  .tools-pills a {
    display: inline-block;
    padding: 6px 14px;
    background: var(--primary-light);
    color: var(--primary-dark);
    text-decoration: none;
    border-radius: 20px;
    font-size: 0.9rem;
    transition: all 0.15s ease;
  }

  .tools-pills a:hover {
    background: var(--primary);
    color: #fff;
  }

  /* No TTS warning */
  .no-tts {
    background: #f5e6e0;
    border: 1px solid #d4a59a;
    border-radius: var(--radius);
    padding: 14px;
    color: #9a6b60;
    text-align: center;
    font-size: 0.9rem;
    display: none;
    margin-bottom: 16px;
  }
</style>

<body>

<div class="container">
  <header>
    <h1>🔊 English Reader</h1>
    <p>貼上英文句子，一句一句聽發音</p>
  </header>

  <div class="no-tts" id="noTts">
    ⚠️ 你的瀏覽器不支援語音功能，請用 Chrome 或 Safari 開啟。
  </div>

  <!-- Input -->
  <div class="input-section" id="inputSection">
    <label>貼上或輸入英文內容</label>
    <textarea id="textInput" placeholder="When I was little, I was SO small,&#10;I didn't know much at all.&#10;At school I learned to wait my turn,&#10;to share my toys, and use kind words."></textarea>
    <button class="load-sample" onclick="loadSample()">▸ 載入範例句子試試看</button>
    <div class="split-mode">
      <span>分句方式：</span>
      <div class="split-toggle">
        <button class="split-opt active" id="splitLine" onclick="setSplitMode('line')">每行一句</button>
        <button class="split-opt" id="splitAuto" onclick="setSplitMode('auto')">自動分句</button>
      </div>
    </div>
    <div class="voice-row">
      <span>語音：</span>
      <select class="voice-select" id="voiceSelect">
        <option value="">載入中...</option>
      </select>
    </div>
    <div class="input-actions">
      <button class="btn btn-primary" onclick="startReading()">開始朗讀 →</button>
      <button class="btn btn-clear" onclick="clearInput()">清除</button>
    </div>
  </div>

  <!-- Reader -->
  <div class="reader-section" id="readerSection">
    <div class="controls">
      <button class="ctrl-btn" id="playAllBtn" onclick="playAll()">
        <span id="playAllIcon">▶</span> 整篇播放
      </button>
      <div class="speed-group">
        <button class="speed-btn active" id="speedNormal" onclick="setSpeed('normal')" title="1x">🐇</button>
        <button class="speed-btn" id="speedSlow" onclick="setSpeed('slow')" title="0.75x">🐢</button>
        <button class="speed-btn" id="speedSlower" onclick="setSpeed('slower')" title="0.6x">🐌</button>
      </div>
    </div>

    <div class="sentences" id="sentences"></div>

    <div class="edit-bar">
      <button class="edit-link" onclick="backToEdit()">✏️ 重新編輯內容</button>
    </div>
  </div>

  <button class="stop-floating" id="stopBtn" onclick="stopAll()">⏹ Stop</button>

  <footer class="footer">

<script>
let lines = [];
let speed = 'normal';
let splitMode = 'line';
let isPlayingAll = false;
let resumeTimer = null;
let voicesReady = false;
let selectedVoice = null;

// TTS check
if (!('speechSynthesis' in window)) {
  document.getElementById('noTts').style.display = 'block';
}

const accentMap = {
  'en-US': '美式', 'en-GB': '英式', 'en-AU': '澳式', 'en-IN': '印度',
  'en-IE': '愛爾蘭', 'en-ZA': '南非', 'en-NZ': '紐西蘭', 'en-CA': '加拿大',
  'en-SG': '新加坡', 'en-PH': '菲律賓', 'en-HK': '香港',
};
const femaleNames = ['female', 'woman', 'zira', 'samantha', 'karen', 'moira', 'tessa', 'fiona', 'veena', 'susan', 'hazel', 'heera', 'linda', 'catherine', 'ava', 'allison', 'kate', 'serena', 'victoria', 'shelley', 'sandy', 'rishi', 'nicky', 'joana'];
const maleNames = ['male', 'man', 'david', 'mark', 'james', 'daniel', 'george', 'richard', 'alex', 'tom', 'fred', 'ralph', 'aaron', 'oliver', 'thomas', 'gordon', 'lee', 'liam', 'evan', 'nathan'];

function getVoiceLabel(v) {
  const lang = v.lang.replace('_', '-');
  const accent = accentMap[lang] || accentMap[lang.substring(0, 5)] || lang;
  const lower = v.name.toLowerCase();
  let gender = '';
  if (femaleNames.some(n => lower.includes(n))) gender = '女聲';
  else if (maleNames.some(n => lower.includes(n))) gender = '男聲';
  const shortName = v.name.replace(/Microsoft\s*/i, '').replace(/Google\s*/i, '').replace(/\s*Online\s*\(Natural\)/i, '').split(' - ')[0].split('(')[0].trim();
  return `${accent}${gender ? ' ' + gender : ''} - ${shortName}`;
}

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (voices.length === 0) return;
  voicesReady = true;

  const select = document.getElementById('voiceSelect');
  select.innerHTML = '';

  const enVoices = voices.filter(v => v.lang.startsWith('en'));
  if (enVoices.length === 0) return;

  const seen = new Set();
  const unique = [];
  for (const v of enVoices) {
    const key = v.name + '|' + v.lang;
    if (!seen.has(key)) { seen.add(key); unique.push(v); }
  }

  const order = ['en-US', 'en-GB', 'en-AU'];
  unique.sort((a, b) => {
    const ai = order.indexOf(a.lang); const bi = order.indexOf(b.lang);
    const ao = ai >= 0 ? ai : 99; const bo = bi >= 0 ? bi : 99;
    return ao - bo || a.name.localeCompare(b.name);
  });

  let bestIdx = 0;
  unique.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = getVoiceLabel(v);
    select.appendChild(opt);
    if (i === 0) bestIdx = 0;
    const lower = v.name.toLowerCase();
    if (!selectedVoice && v.lang.startsWith('en-US') && femaleNames.some(n => lower.includes(n))) {
      bestIdx = i;
    }
  });

  select.value = bestIdx;
  selectedVoice = unique[bestIdx];

  select.onchange = () => {
    selectedVoice = unique[parseInt(select.value)];
  };

  window._voiceList = unique;
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function getSelectedVoice() {
  if (selectedVoice) return selectedVoice;
  loadVoices();
  return selectedVoice;
}

function setSplitMode(mode) {
  splitMode = mode;
  document.getElementById('splitLine').classList.toggle('active', mode === 'line');
  document.getElementById('splitAuto').classList.toggle('active', mode === 'auto');
}

function splitBySentence(text) {
  const result = [];
  const regex = /[^.!?]*[.!?]+["'”’)}\]]?\s*/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    const s = match[0].trim();
    if (s.length > 0) result.push(s);
  }
  const covered = result.join('').length;
  const remainder = text.slice(covered).trim();
  if (remainder.length > 0) result.push(remainder);
  return result.filter(s => s.length > 0);
}

function loadSample() {
  document.getElementById('textInput').value = "When I was little, I was SO small,\nI didn't know much at all.\nAt school I learned to wait my turn,\nto share my toys, and use kind words.";
  document.getElementById('textInput').focus();
}

function clearInput() {
  document.getElementById('textInput').value = '';
  document.getElementById('textInput').focus();
}

function startReading() {
  const raw = document.getElementById('textInput').value.trim();
  if (!raw) return;

  if (splitMode === 'auto') {
    lines = splitBySentence(raw);
  } else {
    lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  }
  if (lines.length === 0) return;

  if (!voicesReady) loadVoices();

  renderSentences();
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('readerSection').classList.add('visible');
}

function renderSentences() {
  const container = document.getElementById('sentences');
  container.innerHTML = '';

  lines.forEach((line, i) => {
    const row = document.createElement('div');
    row.className = 'sentence-row';
    row.id = `row-${i}`;
    row.onclick = () => playSingle(i);

    const num = document.createElement('div');
    num.className = 'sentence-num';
    num.textContent = i + 1;

    const text = document.createElement('div');
    text.className = 'sentence-text';
    text.textContent = line;

    const icon = document.createElement('div');
    icon.className = 'play-icon';
    icon.textContent = '▶';

    row.appendChild(num);
    row.appendChild(text);
    row.appendChild(icon);
    container.appendChild(row);
  });
}

function getRate() {
  if (speed === 'slower') return 0.6;
  if (speed === 'slow') return 0.75;
  return 1;
}

function clearHighlights() {
  document.querySelectorAll('.sentence-row').forEach(r => r.classList.remove('playing'));
}

// Chrome TTS bug workaround: keep synthesis alive
function startResumeTimer() {
  stopResumeTimer();
  resumeTimer = setInterval(() => {
    if (speechSynthesis.speaking && !speechSynthesis.paused) {
      speechSynthesis.pause();
      speechSynthesis.resume();
    }
  }, 10000);
}

function stopResumeTimer() {
  if (resumeTimer) {
    clearInterval(resumeTimer);
    resumeTimer = null;
  }
}

function playSingle(index) {
  speechSynthesis.cancel();
  isPlayingAll = false;
  stopResumeTimer();
  document.getElementById('stopBtn').classList.remove('visible');
  clearHighlights();

  const row = document.getElementById(`row-${index}`);
  row.classList.add('playing');
  row.scrollIntoView({ behavior: 'smooth', block: 'center' });

  const u = new SpeechSynthesisUtterance(lines[index]);
  u.lang = 'en-US';
  u.rate = getRate();
  u.pitch = 1.0;
  const voice = getSelectedVoice();
  if (voice) u.voice = voice;

  u.onend = () => { row.classList.remove('playing'); stopResumeTimer(); };
  u.onerror = () => { row.classList.remove('playing'); stopResumeTimer(); };

  startResumeTimer();
  speechSynthesis.speak(u);
}

function speakLine(index) {
  return new Promise((resolve) => {
    clearHighlights();
    const row = document.getElementById(`row-${index}`);
    row.classList.add('playing');
    row.scrollIntoView({ behavior: 'smooth', block: 'center' });

    const u = new SpeechSynthesisUtterance(lines[index]);
    u.lang = 'en-US';
    u.rate = getRate();
    u.pitch = 1.0;
    const voice = getSelectedVoice();
    if (voice) u.voice = voice;

    u.onend = () => { row.classList.remove('playing'); resolve(); };
    u.onerror = () => { row.classList.remove('playing'); resolve(); };

    speechSynthesis.speak(u);
  });
}

async function playAll() {
  if (isPlayingAll) {
    stopAll();
    return;
  }

  isPlayingAll = true;
  const btn = document.getElementById('playAllBtn');
  btn.classList.add('playing');
  document.getElementById('playAllIcon').textContent = '⏸';
  document.getElementById('stopBtn').classList.add('visible');
  startResumeTimer();

  for (let i = 0; i < lines.length; i++) {
    if (!isPlayingAll) break;
    await speakLine(i);
    if (i < lines.length - 1 && isPlayingAll) {
      await new Promise(r => setTimeout(r, 500));
    }
  }

  stopResumeTimer();
  resetPlayAllBtn();
}

function stopAll() {
  speechSynthesis.cancel();
  isPlayingAll = false;
  stopResumeTimer();
  clearHighlights();
  resetPlayAllBtn();
}

function resetPlayAllBtn() {
  isPlayingAll = false;
  const btn = document.getElementById('playAllBtn');
  btn.classList.remove('playing');
  document.getElementById('playAllIcon').textContent = '▶';
  document.getElementById('stopBtn').classList.remove('visible');
}

function setSpeed(s) {
  speed = s;
  document.getElementById('speedNormal').classList.toggle('active', s === 'normal');
  document.getElementById('speedSlow').classList.toggle('active', s === 'slow');
  document.getElementById('speedSlower').classList.toggle('active', s === 'slower');
}

function backToEdit() {
  stopAll();
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('readerSection').classList.remove('visible');
}
</script>
